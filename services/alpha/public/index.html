<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas · CEO Dashboard</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box}
  body{font:15px/1.55 system-ui,-apple-system,sans-serif;margin:0;background:#f4f6f8;color:#17191f}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 112px}
  h1{font-size:28px;line-height:1.18;margin:2px 0}h2{font-size:15px;color:#2b3038;margin:26px 2px 10px;letter-spacing:0;font-weight:900}
  .muted{color:#68717f;font-size:13px}.caption{font-size:12px;color:#7a8390}
  .card{background:#fff;border:1px solid #e6eaf0;border-radius:20px;padding:18px;margin:10px 0;box-shadow:0 10px 26px rgba(18,26,38,.05)}
  .soft{background:#eefbf4;border-color:#c7f2db}.warn{background:#fff7e8;border-color:#ffe2a7}.danger{background:#fff0f3;border-color:#ffd0dc}
  .row{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}
  .stack{display:flex;flex-direction:column;gap:8px}.top{align-items:flex-start}
  input,select,button{font:inherit}
  input,select{background:#f7f9fb;border:1px solid #dde4ec;color:#17191f;border-radius:14px;padding:13px 14px;width:100%}
  .btn{background:#111827;color:#fff;font-weight:900;border:none;border-radius:14px;padding:12px 16px;cursor:pointer;white-space:nowrap}
  .btn2{background:#fff;color:#20242c;border:1px solid #d9e0e8;border-radius:13px;padding:10px 14px;cursor:pointer;white-space:nowrap}
  .btn.sm,.btn2.sm{padding:6px 10px;font-size:13px}
  .pill{display:inline-block;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700}
  .p-ready{background:#dbf8e8;color:#137342}.p-wait{background:#fff0c2;color:#805900}.p-hire{background:#ffe3ef;color:#9a315b}
  .p-done{background:#e1efff;color:#1f61a5}.p-ok{background:#dcf8e8;color:#137342}
  .tag{display:inline-block;background:#f1f4f8;border-radius:10px;padding:4px 10px;margin:3px 4px 0 0;font-size:12px;color:#3c4654}
  .bar{height:10px;background:#e9eef4;border-radius:999px;overflow:hidden;margin-top:8px}
  .bar>i{display:block;height:100%;background:#111827}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .small{font-size:13px}.mt{margin-top:8px}.b{font-weight:700}
  .result{white-space:pre-wrap;background:#f7f9fb;border:1px solid #e3e8ef;border-radius:14px;padding:12px;margin-top:8px;font-size:13px;color:#20242c}
  .hide{display:none}
  a{color:#2563eb}.hero{padding:22px}.metric{background:#f7f9fb;border-radius:16px;padding:12px}
  .tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);display:flex;gap:4px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid #e2e8f0;z-index:5;backdrop-filter:blur(12px)}
  .tab{flex:1;background:transparent;color:#7a8390;border:none;border-radius:14px;padding:8px 4px;cursor:pointer;font-weight:800;font-size:12px}
  .tab.on{background:#111827;color:#fff}
  .x{background:#f1f4f8;border:none;color:#7b8494;cursor:pointer;font-size:15px;line-height:1;padding:8px 10px;border-radius:10px;flex:0 0 auto}
  .x:hover{background:#e6ebf1;color:#17191f}
  /* 다중 입력 행: 텍스트/URL · 파일선택 · 삭제(X) 가 겹치지 않게 */
  .io-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .io-row .io-val,.io-row .io-file{min-width:0}
  .io-row .io-val{flex:1 1 220px;width:auto}
  .io-row .io-file{flex:1 1 180px;width:auto;max-width:100%;font-size:13px}
  /* 긴 값/파일명 줄바꿈 */
  .vbreak{overflow-wrap:anywhere;word-break:break-word}
  /* 카드 하단 액션 영역(뱃지 + 수정/X) */
  .card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:12px}
  .card-actions .spacer{flex:1 1 auto}
  .toast{background:#eafbf1;border:1px solid #bfeccd;color:#155f38;border-radius:16px;padding:12px 14px;margin:10px 0;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .search{position:sticky;top:0;background:#f4f6f8;padding:6px 0;z-index:2}
  .big-cta{display:block;width:100%;font-size:18px;padding:18px 18px;border-radius:18px;margin-top:12px}
  .home-action{padding:14px;margin:8px 0 10px;border-radius:18px}
  .home-action .big-cta{font-size:16px;padding:13px 14px;border-radius:15px;margin-top:10px}
  .home-action .b{font-size:19px!important}
  .home-summary h2{margin:14px 2px 8px}
  .home-summary .card{padding:12px 14px;margin:7px 0;border-radius:16px}
  .home-summary .b{font-size:15px}
  .home-summary .muted.mt{margin-top:3px}
  .home-summary .btn2.sm{width:auto;flex:0 0 auto;padding:5px 9px}
  .home-summary .company-score{font-size:24px;font-weight:900}
  .home-summary .company-title{font-size:18px!important}
  .home-summary .bar{height:7px;margin-top:7px}
  .profile{border:1px solid #e7edf4;border-radius:18px;padding:14px;margin-top:10px;background:#fff}
  .profile-head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start}
  .avatar{width:42px;height:42px;border-radius:15px;background:#111827;color:#fff;display:grid;place-items:center;font-weight:900;flex:0 0 auto}
  .group-title{font-size:13px;font-weight:900;color:#68717f;margin:18px 2px 8px}
  @media(max-width:560px){
    .grid{grid-template-columns:1fr}
    .row.resp{align-items:stretch;flex-direction:column}
    .btn:not(.sm),.btn2:not(.sm){width:100%}
    h1{font-size:25px}
    .profile-head{flex-direction:column}.profile-head .pill{align-self:flex-start}
    /* 입력 행: 텍스트/URL 한 줄, 파일선택+X 다음 줄 */
    .io-row .io-val{flex-basis:100%}
    .io-row .io-file{flex:1 1 auto}
  }
</style></head>
<body><div class="wrap">

<div id="login">
  <h1>Atlas가 오늘 대표님의 시간을 돌려드립니다.</h1>
  <div class="muted">채팅 앱이 아니라, 업무를 맡기고 결과를 확인하는 CEO Dashboard입니다.</div>
  <div class="card hero">
    <label class="muted">대표 이름</label>
    <input id="name" value="효주 대표">
    <label class="muted mt" style="display:block">비밀번호</label>
    <input id="pass" type="password" placeholder="atlas">
    <div class="mt"><button class="btn" style="width:100%" onclick="doLogin()">시작하기</button></div>
    <div id="loginerr" style="color:#f0a0c0;margin-top:8px"></div>
  </div>
</div>

<div id="app" class="hide"></div>

</div>
<script>
let token="", DB=null, ATAB="home", TOAST="";
const TABS=[["home","홈"],["tasks","업무"],["vault","자료"],["results","결과물"],["staff","직원"]];
let VFILTER="all", VEDIT="";
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const attr=(s)=>esc(s).replace(/"/g,"&quot;");
const api=async(p,b)=>(await fetch(p,{method:"POST",headers:{"content-type":"application/json","x-atlas-token":token},body:JSON.stringify(b||{})})).json();

async function doLogin(){
  let r;
  try{ r=await api("/api/login",{ownerName:$("name").value,pass:$("pass").value}); }
  catch(e){ $("loginerr").textContent="서버에 연결할 수 없습니다. 다시 시도해 주세요."; return; }
  if(!r||!r.ok){$("loginerr").textContent=(r&&r.reason)||"로그인 실패";return;}
  if(!r.dashboard){$("loginerr").textContent="대시보드를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";return;}
  token=r.token; DB=r.dashboard;
  $("login").classList.add("hide"); $("app").classList.remove("hide");
  render();
}
function outLabel(t){return ({image_brief:"이미지 제작 기획안",ad_copy:"광고 카피",social_post:"SNS 포스트",customer_reply:"고객 응대",report:"리포트",text:"텍스트",document:"문서",product_page:"상세페이지"})[t]||t;}
function reqTypeLabel(rt){return ({text:"텍스트",image_credit:"이미지 생성(크레딧)",image_brief:"이미지 기획안",image_designer_brief:"Designer 기획안"})[rt]||"";}
function resultMeta(r){
  const alt = r.requestedOutputType && r.requestedOutputType!==r.outputType;
  const st = r.state==="final"?"최종본":r.state==="pending"?"생성 준비됨":"초안";
  let s = `${outLabel(r.outputType)} · ${st} · ${esc(r.by)}`;
  if(alt) s+=` <span class="pill p-wait">실제 ${esc(r.requestedOutputType)} 아님</span>`;
  if(r.requestType) s+=` <span class="pill p-done">${esc(reqTypeLabel(r.requestType))}</span>`;
  if(r.creditsUsed) s+=` <span class="pill p-wait">크레딧 ${r.creditsUsed}</span>`;
  return s;
}
function statusPill(s){
  const m={ready:["p-ready","실행 가능"],ready_with_missing_info:["p-wait","일부 자료로 진행"],awaiting_materials:["p-wait","자료 대기"],needs_hire:["p-hire","직원 필요"],delivered:["p-done","결과 완료"],approved:["p-ok","승인됨"],revise:["p-wait","수정 요청"]};
  const [c,l]=m[s]||["p-wait",s]; return `<span class="pill ${c}">${l}</span>`;
}
function roleProfile(role){
  return ({
    content:{name:"Writer Employee",field:"콘텐츠",group:"콘텐츠",icon:"W",good:"SNS 글, 광고 카피, 상세 문구",no:"로고 디자인, 이미지 제작",industries:"카페 · 뷰티 · 쇼핑몰 · 병원",option:"월 계약 · Placeholder",price:"월 99,000원 · Placeholder"},
    design:{name:"Designer Employee",field:"디자인",group:"디자인",icon:"D",good:"이미지 기획안, 배너, 썸네일",no:"실제 이미지 생성, 의료/법률 검수",industries:"카페 · 쇼핑몰 · 뷰티",option:"프로젝트/월 계약 · Placeholder",price:"월 149,000원 · Placeholder"},
    marketing:{name:"Marketing Employee",field:"마케팅",group:"마케팅",icon:"M",good:"캠페인 기획, 홍보 우선순위",no:"광고비 집행, 외부 매체 구매",industries:"카페 · 뷰티 · 쇼핑몰",option:"월 계약 · Placeholder",price:"월 129,000원 · Placeholder"},
    operations:{name:"Operations Employee",field:"운영",group:"운영",icon:"O",good:"재고, 발주, 매장 체크리스트",no:"실제 발주 대행, 결제 처리",industries:"카페 · 병원 · 뷰티",option:"월 계약 · Placeholder",price:"월 119,000원 · Placeholder"},
    support:{name:"CS Employee",field:"CS",group:"CS",icon:"C",good:"문의 답변, 리뷰 대응, FAQ",no:"법적 분쟁 대응, 환자 진단",industries:"쇼핑몰 · 병원 · 뷰티",option:"월 계약 · Placeholder",price:"월 109,000원 · Placeholder"},
    research:{name:"Research Employee",field:"리서치",group:"리서치",icon:"R",good:"자료 조사, 보고서 정리",no:"전문가 최종 판단, 규제 승인",industries:"병원 · 쇼핑몰 · 교육",option:"월 계약 · Placeholder",price:"월 129,000원 · Placeholder"},
  })[role]||{name:role,field:"업무",group:"기타",icon:"A",good:"대표 업무 지원",no:"범위 밖 업무",industries:"전 업종",option:"계약 옵션 · Placeholder",price:"가격 · Placeholder"};
}
function setTab(t){ ATAB=t; render(); }

function render(){
  try{ renderInner(); }
  catch(e){
    console.error("render error:", e);
    $("app").innerHTML=`<div class="card"><div class="b">화면을 그리는 중 문제가 발생했습니다.</div>
      <div class="muted mt">${esc(e&&e.message||e)}</div>
      <div class="mt"><button class="btn" onclick="location.reload()">새로고침</button></div></div>`;
  }
}
// ── 섹션 빌더 ──
function secHeader(){
  const d=DB, hour=new Date().getHours();
  const greet=hour<11?"좋은 아침입니다":hour<18?"안녕하세요":"좋은 저녁입니다";
  return `<div class="row between top"><div><h1>${greet}, ${esc(d.ownerName)}님</h1>
    <div class="muted">${esc(d.company.name)}를 오늘도 Atlas가 같이 운영합니다.</div></div></div>
    <div class="card hero home-action"><div class="caption">대표님이 바로 할 일</div>
      <div class="b" style="font-size:22px;margin-top:4px">오늘 처리할 업무를 직원에게 맡기세요</div>
      <button class="btn big-cta" onclick="setTab('tasks')">새 업무 시작</button></div>`;
}
function secHomeSummary(){
  const d=DB;
  const open=(d.tasks||[]).length, done=(d.deliverables||[]).length;
  const hired=(d.employees||[]).filter(e=>e.hired).length, reco=(d.recommendedHires||[]).length;
  const nextTask=(d.tasks||[])[0];
  const lastResult=(d.deliverables||[])[0];
  const hiredNames=(d.employees||[]).filter(e=>e.hired).map(e=>e.title).slice(0,2).join(", ");
  return `<div class="home-summary"><h2>오늘의 회사</h2>
    <div class="card soft"><div class="row between top"><div><div class="caption">회사 상태</div>
      <div class="b company-title" style="font-size:22px;margin-top:2px">확인할 항목 ${open + reco}개</div>
      <div class="muted mt">필요한 행동만 요약합니다.</div></div>
      <div class="company-score">${d.readiness}%</div></div><div class="bar"><i style="width:${d.readiness}%"></i></div></div>
    <div class="card"><div class="row between top"><div><div class="caption">진행 중 업무</div><div class="b">${open}건 진행 중</div>
      <div class="muted mt">${nextTask?esc(nextTask.title):"새 업무를 등록하면 직원과 다음 행동이 정리됩니다."}</div></div><button class="btn2 sm" onclick="setTab('tasks')">자세히 보기</button></div></div>
    <div class="card"><div class="row between top"><div><div class="caption">결과물</div><div class="b">${done}개 보관 중</div>
      <div class="muted mt">${lastResult?esc(lastResult.title):"완료된 결과물이 아직 없습니다."}</div></div><button class="btn2 sm" onclick="setTab('results')">자세히 보기</button></div></div>
    <div class="card"><div class="row between top"><div><div class="caption">직원</div><div class="b">채용 ${hired}명 · 추천 ${reco}명</div>
      <div class="muted mt">${hiredNames?esc(hiredNames):"현재 채용된 직원이 없습니다."}</div></div><button class="btn2 sm" onclick="setTab('staff')">자세히 보기</button></div></div></div>`;
}
function secPriorities(){
  const d=DB;
  return `<h2>오늘 해야 할 일</h2><div class="card stack">`+
    (d.priorities.map(p=>`<div class="row between resp"><span class="b">${esc(p)}</span><button class="btn2 sm" onclick="quick('${esc(p)}')">업무로 등록</button></div>`).join("")||`<span class="muted">오늘 처리할 일이 없습니다.</span>`)+`</div>`;
}
function secNewTask(){
  return `<h2>새 업무</h2><div class="card"><div class="row resp">
      <input id="newtask" placeholder="예) 오늘 신메뉴 홍보 콘텐츠 필요" onkeydown="if(event.key==='Enter')register()">
      <button class="btn" onclick="register()">새 업무 등록</button></div>
      <div class="muted mt">채팅하지 않아도 됩니다. 필요한 일을 한 줄로 적으면 담당 직원과 필요한 자료를 정리합니다.</div></div>`;
}
function secOpenTasks(){
  const open=DB.tasks;   // 서버에서 이미 숨김·승인 제외됨
  return `<h2>진행 중 업무</h2>`+(open.length? open.map(taskCard).join("") : `<div class="card muted">진행 중 업무가 없습니다. 새 업무를 등록하면 담당 직원과 다음 행동이 여기에 표시됩니다.</div>`);
}
function secCurrentStaff(){
  const d=DB;
  const hired=d.employees.filter(e=>e.hired);
  let h=`<h2>현재 직원</h2>`;
  h+=hired.length?hired.map(e=>{const p=roleProfile(e.roleFamily);const recent=(d.tasks||[]).find(t=>(t.assignees||[]).includes(e.title));
    return `<div class="card"><div class="profile-head"><div class="row top"><div class="avatar">${esc(p.icon)}</div><div><div class="b">${esc(e.title)}</div><div class="muted">${esc(p.field)} 전문 직원</div></div></div><span class="pill p-ok">계약 중</span></div>
      <div class="grid mt"><div><div class="caption">남은 기간</div><div class="b">21일 · Placeholder</div></div><div><div class="caption">계약 옵션</div><div class="b">${esc(p.option)}</div></div></div>
      <div class="mt"><span class="tag">담당 업무</span><span class="muted">${esc(p.good)}</span></div>
      <div class="mt"><span class="tag">최근 작업</span><span class="muted">${recent?esc(recent.title):"아직 표시할 작업이 없습니다"}</span></div>
      <button class="btn2 mt" onclick="placeholder('계약 연장은 다음 Sprint에서 연결됩니다.')">연장하기</button></div>`}).join(""):`<div class="card muted">아직 채용된 직원이 없습니다.</div>`;
  return h;
}
function secRecommendedHires(){
  const d=DB; let h="";
  if(d.recommendedHires.length){
    h+=`<h2>현재 사업 추천 직원</h2>`+d.recommendedHires.map(r=>employeeCard(r.roleFamily,{title:r.title,hired:false,reason:recommendationReason(r.roleFamily,r.reason),primary:true})).join("");
  } else {
    h+=`<h2>현재 사업 추천 직원</h2><div class="card soft"><div class="b">지금은 필수 추천 직원이 없습니다</div><div class="muted mt">새 이미지, CS, 마케팅 업무를 등록하면 필요한 직원을 추천합니다.</div></div>`;
  }
  return h;
}
function secAllEmployees(){
  const d=DB; let h="";
  const groups={};
  d.employees.forEach(e=>{const p=roleProfile(e.roleFamily);(groups[p.group]??=[]).push(e);});
  const order=["콘텐츠","디자인","운영","CS","마케팅","재무","리서치"];
  h+=`<h2>전체 직원</h2>`;
  order.filter(g=>groups[g]).forEach(g=>{
    h+=`<div class="group-title">${g}</div>`+groups[g].map(e=>employeeCard(e.roleFamily,{title:e.title,hired:e.hired,reason:e.hired?"이미 현재 회사에서 일하고 있습니다.":"현재 사업에서 자주 생기는 업무를 더 빠르게 처리할 수 있습니다."})).join("");
  });
  return h;
}
function secEmployeeHub(){
  return `<h1>직원</h1><div class="muted">현재 계약한 직원과 앞으로 채용할 직원을 한곳에서 관리합니다.</div>`+
    secCurrentStaff()+secRecommendedHires()+secHQCatalog()+secAllEmployees();
}
function costLabel(t){return ({low:"낮은 원가",medium:"중간 원가",high:"높은 원가",very_high:"매우 높은 원가"})[t]||t;}
function secHQCatalog(){
  const groups=DB.hqEmployees||[];
  if(!groups.length) return "";

function recommendationReason(role, fallback){
  const d=DB, tasks=d.tasks||[], hired=d.employees.filter(e=>e.hired).map(e=>e.roleFamily);
  const p=roleProfile(role);
  const recent=tasks.filter(t=>(t.recommendedHires||[]).some(h=>h.roleFamily===role)||t.assignees?.includes(p.name)).length;
  const lines=[fallback];
  if(recent) lines.push(`최근 관련 업무 요청 ${recent}건`);
  if(!hired.includes(role)) lines.push(`현재 회사에는 ${p.name}가 없습니다`);
  if(role==="design") lines.push("이미지 결과물 품질 향상");
  else if(role==="support") lines.push("문의와 리뷰 답변 시간을 줄일 수 있습니다");
  else if(role==="marketing") lines.push("홍보 우선순위를 대표 대신 정리합니다");
  else lines.push(`${DB.company.name} 업종에서 반복 업무를 줄이는 데 적합합니다`);
  return lines;
}

function taskCard(t){
  let inner=`<div class="row between"><div class="b">${esc(t.title)}</div>
    <div class="row" style="gap:6px">${statusPill(t.status)}<button class="x" title="숨기기" onclick="hideCard('${t.id}')">✕</button></div></div>
    <div class="muted small mt">담당 직원: ${t.assignees.map(esc).join(", ")||"배정 대기"}</div>`;

  // 제공 완료 자료
  if(t.provided.length){
    inner+=`<div class="mt small">제공 완료: ${t.provided.map(p=>`<span class="pill p-ok">${esc(p.label)}${p.kind!=="text"?`·${p.kind}`:""}</span>`).join(" ")}</div>`;
  }
  // 기존 자료 사용 (Vault에서 자동 활용 — 다시 묻지 않음)
  if((t.reusedMaterials||[]).length){
    inner+=`<div class="mt small">기존 자료 사용: ${t.reusedMaterials.map(p=>`<span class="pill p-done">${esc(p.label)}</span>`).join(" ")}</div>`;
  }
  // HQ 판단: 이 업무에 가능한 전문 직원 (고객이 아무 직원에게 못 시킴 — HQ가 적합성 관리)
  const sup=[]; const seen=new Set();
  (t.suitability||[]).forEach(s=>(s.supported||[]).forEach(e=>{if(!seen.has(e.id)){seen.add(e.id);sup.push(e);}}));
  if(sup.length){
    inner+=`<div class="mt small">HQ 추천 전문 직원: ${sup.slice(0,4).map(e=>`<span class="pill p-ready">${esc(e.title)}</span>`).join(" ")}</div>`;
  }
  // 필요 자료 (미제공 — 자료 제공 입력, 다중 가능)
  if(t.neededMaterials.length){
    inner+=`<div class="mt b small">필요한 자료</div><div class="muted small">텍스트·파일·이미지·URL을 여러 개 추가할 수 있습니다.</div>`;
    t.neededMaterials.forEach(m=>{
      const cid=`prows_${t.id}_${m.key}`;
      inner+=`<div class="mt"><span class="tag p-wait">${esc(m.label)} · 미제공</span>
        <div id="${cid}" class="mt">${ioRow()}</div>
        <div class="row" style="gap:6px">
          <button class="btn2 sm" type="button" onclick="addRow('${cid}')">+ 항목 추가</button>
          <button class="btn sm" onclick="provide('${t.id}','${m.key}')">제공</button></div></div>`;
    });
  }
  // 추천 채용 (업무 기준 — 비차단 업셀)
  if(t.recommendedHires.length){
    inner+=`<div class="mt small">더 정확하게 하려면: `+t.recommendedHires.map(r=>`<button class="btn2 sm" onclick="hire('${r.roleFamily}')">${esc(r.title)} 채용</button>`).join(" ")+`</div>`;
  }
  // 단일 CTA(중앙화) — 이미지 요청은 선택/크레딧 게이트
  const k=t.cta&&t.cta.kind;
  if(k==="image_choice"){
    inner+=imageChoiceCard(t);
  } else if(k==="credit_blocked"){
    inner+=creditBlockedCard(t);
  } else if(t.cta && k!=="blocked"){
    if(t.cta.label==="이대로 초안으로 진행하기"||t.cta.label==="최소 정보로 초안 진행하기")
      inner+=`<div class="mt small" style="color:#e8c772">일부 자료가 아직 제공되지 않았습니다. 현재 자료만으로도 초안 진행은 가능하지만, 자료를 더 제공할수록 결과물이 더 정확해집니다.</div>`;
    inner+=`<div class="mt"><button class="btn" onclick="execute('${t.id}')">${esc(t.cta.label)}</button></div>`;
  } else if(k==="blocked"){
    inner+=`<div class="mt small" style="color:#f0a0c0">지금은 바로 진행할 수 없습니다. 아래가 필요합니다:</div>
      <div class="small">${(t.nextActions||[]).map(a=>`· ${esc(a)}`).join("<br>")||"필요한 자료/직원을 확인해 주세요."}</div>`;
  }
  // 결과물 카드
  if(t.results.length){
    inner+=`<div class="mt b small">결과물</div>`;
    if(t.partialMaterials) inner+=`<div class="small" style="color:#e8c772">일부 자료가 부족한 상태에서 초안으로 작성되었습니다. 자료를 더 제공하면 다시 실행해 품질을 높일 수 있습니다.</div>`;
    t.results.forEach(r=>{
      inner+=`<div class="result"><div class="b small">${resultMeta(r)}</div>${esc(r.content)}</div>`;
    });
    if(t.status!=="approved") inner+=`<div class="row mt"><button class="btn" onclick="approve('${t.id}')">승인하기</button><button class="btn2" onclick="revise('${t.id}')">수정 요청</button></div>`;
  }
  return `<div class="card">${inner}</div>`;
}

async function register(){const v=($("newtask")||{}).value?.trim();if(!v)return;const r=await api("/api/register",{title:v});DB=r.dashboard;render();}
async function quick(title){const r=await api("/api/register",{title});DB=r.dashboard;render();}
// ── 다중 입력 행(텍스트/URL/파일/이미지) 공용 헬퍼 ──
function ioRow(){return `<div class="row io-row" style="gap:6px"><input class="io-val" placeholder="텍스트 또는 URL"><input type="file" class="io-file"><button class="x" type="button" title="삭제" onclick="this.closest('.io-row').remove()">✕</button></div>`;}
function addRow(id){const c=$(id);if(c)c.insertAdjacentHTML("beforeend",ioRow());}
function rowsToItems(container){
  const items=[];
  if(!container)return items;
  container.querySelectorAll(".io-row").forEach(row=>{
    const fileEl=row.querySelector(".io-file"), txt=(row.querySelector(".io-val")?.value||"").trim();
    let kind="text",value=txt;
    if(fileEl&&fileEl.files&&fileEl.files[0]){const f=fileEl.files[0];value=f.name;kind=f.type.startsWith("image/")?"image":"file";}
    else if(/^https?:\/\//.test(txt))kind="url";
    if(value)items.push({kind,value});
  });
  return items;
}
async function provide(taskId,key){
  const items=rowsToItems($(`prows_${taskId}_${key}`));
  if(!items.length){alert("자료를 1개 이상 입력하거나 파일을 선택하세요");return;}
  const r=await api("/api/provide",{taskId,infoKey:key,items});DB=r.dashboard;render();
}

async function saveEditVault(id){
  const category=($(`ecat_${id}`)||{}).value, value=($(`eval_${id}`)||{}).value.trim(), note=($(`enote_${id}`)||{}).value.trim();
  if(!value){alert("자료명/값을 입력하세요");return;}
  const r=await api("/api/vault/edit",{id,category,value,note});DB=r.dashboard;VEDIT="";render();
}
async function hideVault(id){const r=await api("/api/vault/hide",{id});DB=r.dashboard;render();}

  const q=($("vaultSearch")?.value||"").toLowerCase().trim();
  document.querySelectorAll(".vault-card").forEach(el=>{
    el.style.display=(!q||el.dataset.search.includes(q))?"block":"none";
  });
}
