<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas · CEO Dashboard</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  body{font:15px/1.55 system-ui,-apple-system,sans-serif;margin:0;background:#0d0f14;color:#eef1f5}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:22px;margin:2px 0}h2{font-size:13px;color:#8b94a3;margin:22px 2px 8px;letter-spacing:.04em}
  .muted{color:#7b8494;font-size:13px}
  .card{background:#161922;border:1px solid #232a36;border-radius:16px;padding:16px;margin:10px 0}
  .row{display:flex;gap:8px;align-items:center}.between{justify-content:space-between}
  input,select,button{font:inherit}
  input,select{background:#0e1320;border:1px solid #2a3242;color:#eef1f5;border-radius:10px;padding:9px 10px;width:100%}
  .btn{background:#4ade9b;color:#08120c;font-weight:800;border:none;border-radius:11px;padding:10px 14px;cursor:pointer;white-space:nowrap}
  .btn2{background:#1c2330;color:#dfe5ee;border:1px solid #2c3442;border-radius:10px;padding:8px 12px;cursor:pointer;white-space:nowrap}
  .btn.sm,.btn2.sm{padding:6px 10px;font-size:13px}
  .pill{display:inline-block;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700}
  .p-ready{background:#13351f;color:#5fe39e}.p-wait{background:#33270f;color:#e8c772}.p-hire{background:#331826;color:#f0a0c0}
  .p-done{background:#13294a;color:#79b8ff}.p-ok{background:#1d3326;color:#7ee0a6}
  .tag{display:inline-block;background:#1c2330;border-radius:8px;padding:2px 9px;margin:3px 4px 0 0;font-size:12px;color:#cdd5e1}
  .bar{height:8px;background:#1c2330;border-radius:999px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;background:#4ade9b}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .small{font-size:13px}.mt{margin-top:8px}.b{font-weight:700}
  .result{white-space:pre-wrap;background:#0e1320;border:1px solid #222a37;border-radius:10px;padding:10px;margin-top:6px;font-size:13px}
  .hide{display:none}
  a{color:#79b8ff}
  .tabs{position:sticky;top:0;background:#0d0f14;display:flex;gap:6px;padding:8px 0;margin-bottom:6px;border-bottom:1px solid #1c2330;z-index:5}
  .tab{flex:1;background:transparent;color:#8b94a3;border:none;border-radius:10px;padding:9px 6px;cursor:pointer;font-weight:700}
  .tab.on{background:#161922;color:#eef1f5;border:1px solid #232a36}
  .x{background:transparent;border:none;color:#7b8494;cursor:pointer;font-size:15px;line-height:1;padding:2px 6px;border-radius:8px}
  .x:hover{background:#1c2330;color:#eef1f5}
  .toast{background:#13251f;border:1px solid #1d3a30;color:#9fe3c4;border-radius:12px;padding:10px 14px;margin:8px 0;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
</style></head>
<body><div class="wrap">

<div id="login">
  <h1>🏢 Atlas</h1>
  <div class="muted">대표는 대화하러 오지 않습니다. 일을 끝내러 옵니다.</div>
  <div class="card">
    <label class="muted">대표 이름</label>
    <input id="name" value="효주 대표">
    <label class="muted mt" style="display:block">비밀번호</label>
    <input id="pass" type="password" placeholder="atlas">
    <div class="mt"><button class="btn" style="width:100%" onclick="doLogin()">시작하기</button></div>
    <div id="loginerr" style="color:#f0a0c0;margin-top:8px"></div>
  </div>
</div>

<div id="app" class="hide"></div>

</div>
<script>
let token="", DB=null, ATAB="home", TOAST="";
const TABS=[["home","홈"],["tasks","업무"],["staff","직원"],["results","결과물"],["hire","채용"]];
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const api=async(p,b)=>(await fetch(p,{method:"POST",headers:{"content-type":"application/json","x-atlas-token":token},body:JSON.stringify(b||{})})).json();

async function doLogin(){
  let r;
  try{ r=await api("/api/login",{ownerName:$("name").value,pass:$("pass").value}); }
  catch(e){ $("loginerr").textContent="서버에 연결할 수 없습니다. 다시 시도해 주세요."; return; }
  if(!r||!r.ok){$("loginerr").textContent=(r&&r.reason)||"로그인 실패";return;}
  if(!r.dashboard){$("loginerr").textContent="대시보드를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";return;}
  token=r.token; DB=r.dashboard;
  $("login").classList.add("hide"); $("app").classList.remove("hide");
  render();
}
function statusPill(s){
  const m={ready:["p-ready","실행 가능"],ready_with_missing_info:["p-wait","일부 자료로 진행"],awaiting_materials:["p-wait","자료 대기"],needs_hire:["p-hire","직원 필요"],delivered:["p-done","결과 완료"],approved:["p-ok","승인됨"],revise:["p-wait","수정 요청"]};
  const [c,l]=m[s]||["p-wait",s]; return `<span class="pill ${c}">${l}</span>`;
}
function setTab(t){ ATAB=t; render(); }

function render(){
  try{ renderInner(); }
  catch(e){
    console.error("render error:", e);
    $("app").innerHTML=`<div class="card"><div class="b">화면을 그리는 중 문제가 발생했습니다.</div>
      <div class="muted mt">${esc(e&&e.message||e)}</div>
      <div class="mt"><button class="btn" onclick="location.reload()">새로고침</button></div></div>`;
  }
}
// ── 섹션 빌더 ──
function secHeader(){
  const d=DB, hour=new Date().getHours();
  const greet=hour<11?"좋은 아침입니다":hour<18?"안녕하세요":"좋은 저녁입니다";
  return `<div class="row between"><h1>${greet}, ${esc(d.ownerName)}님</h1></div>
    <div class="card"><div class="row between"><div><div class="b">${esc(d.company.name)}</div><div class="muted">회사 운영 준비도</div></div>
      <div class="b" style="font-size:22px">${d.readiness}%</div></div><div class="bar"><i style="width:${d.readiness}%"></i></div></div>`;
}
function secPriorities(){
  const d=DB;
  return `<h2>오늘의 우선순위</h2><div class="card">`+
    (d.priorities.map(p=>`<div class="row between mt"><span>· ${esc(p)}</span><button class="btn2 sm" onclick="quick('${esc(p)}')">시작</button></div>`).join("")||`<span class="muted">없음</span>`)+`</div>`;
}
function secNewTask(){
  return `<h2>새 업무 시작</h2><div class="card"><div class="row">
      <input id="newtask" placeholder="예) 오늘 신메뉴 홍보 콘텐츠 필요" onkeydown="if(event.key==='Enter')register()">
      <button class="btn" onclick="register()">등록</button></div>
      <div class="muted mt">대화가 아니라 업무 등록입니다. 한 줄이면 됩니다.</div></div>`;
}
function secOpenTasks(){
  const open=DB.tasks;   // 서버에서 이미 숨김·승인 제외됨
  return `<h2>진행 중 업무</h2>`+(open.length? open.map(taskCard).join("") : `<div class="card muted">진행 중 업무가 없습니다. 위에서 새 업무를 시작하세요.</div>`);
}
function secStaff(){
  const d=DB;
  let h=`<h2>현재 직원</h2><div class="card"><div class="row mt"><span class="tag">대표 비서 · 출근</span>`;
  h+=d.employees.map(e=>`<span class="tag">${esc(e.title)} · ${e.hired?"출근":"미채용"}</span>`).join("")+`</div></div>`;
  return h;
}
function secHire(){
  const d=DB; let h="";
  if(d.recommendedHires.length){
    h+=`<h2>추천 채용</h2>`+d.recommendedHires.map(r=>`<div class="card"><div class="row between"><div><div class="b">${esc(r.title)}</div>
        <div class="muted small">${esc(r.reason)}</div></div><button class="btn sm" onclick="hire('${r.roleFamily}')">채용하기</button></div></div>`).join("");
  }
  h+=`<h2>직원 채용 목록</h2>`+d.employees.map(e=>`<div class="card"><div class="row between"><div><div class="b">${esc(e.title)} ${e.hired?'<span class="pill p-ok">채용됨</span>':''}</div>
      <div class="muted small">${esc(e.canDo)}</div></div>${e.hired?"":`<button class="btn2 sm" onclick="hire('${e.roleFamily}')">채용하기</button>`}</div></div>`).join("");
  return h;
}
function secResults(){
  const list=DB.deliverables||[];
  let h=`<h2>결과물</h2>`;
  if(!list.length) return h+`<div class="card muted">완료된 결과물이 없습니다. 업무를 실행하면 여기에 모입니다.</div>`;
  h+=list.map(r=>`<div class="card">
    <div class="row between"><div class="b">${esc(r.title)}</div>
      <div class="row" style="gap:6px">${r.approved?'<span class="pill p-ok">승인됨</span>':'<span class="pill p-done">전달 완료</span>'}<button class="x" title="숨기기" onclick="hideCard('${r.taskId}')">✕</button></div></div>
    <div class="muted small mt">${esc(r.outputType)} · ${r.state==="final"?"최종본":"초안"} · 담당 ${esc(r.by)}</div>
    ${r.partialMaterials?'<div class="small" style="color:#e8c772">일부 자료가 부족한 상태에서 초안으로 작성되었습니다.</div>':''}
    <div class="result">${esc(r.content)}</div>
    ${r.canRevise?`<div class="row mt"><button class="btn2 sm" onclick="revise('${r.taskId}')">수정 요청</button></div>`:''}</div>`).join("");
  return h;
}

function renderInner(){
  let h=`<div class="tabs">`+TABS.map(([k,l])=>`<button class="tab ${ATAB===k?'on':''}" onclick="setTab('${k}')">${l}</button>`).join("")+`</div>`;
  if(TOAST){ h+=`<div class="toast">${esc(TOAST)} <button class="btn2 sm" onclick="setTab('results')">결과물 보기</button> <button class="x" onclick="TOAST='';render()">✕</button></div>`; }
  if(ATAB==="home")    h+=secHeader()+secPriorities()+secNewTask()+secOpenTasks();
  else if(ATAB==="tasks") h+=secNewTask()+secOpenTasks();
  else if(ATAB==="staff") h+=secStaff()+secHire();
  else if(ATAB==="results") h+=secResults();
  else if(ATAB==="hire")  h+=secHire();
  $("app").innerHTML=h;
}

function taskCard(t){
  let inner=`<div class="row between"><div class="b">${esc(t.title)}</div>
    <div class="row" style="gap:6px">${statusPill(t.status)}<button class="x" title="숨기기" onclick="hideCard('${t.id}')">✕</button></div></div>
    <div class="muted small mt">담당: ${t.assignees.map(esc).join(", ")||"-"}</div>`;

  // 제공 완료 자료
  if(t.provided.length){
    inner+=`<div class="mt small">제공 완료: ${t.provided.map(p=>`<span class="pill p-ok">${esc(p.label)}${p.kind!=="text"?`·${p.kind}`:""}</span>`).join(" ")}</div>`;
  }
  // 필요 자료 (미제공 — 자료 제공 입력)
  if(t.neededMaterials.length){
    inner+=`<div class="mt b small">필요 자료 (미제공 · 추측하지 않습니다)</div>`;
    t.neededMaterials.forEach(m=>{
      inner+=`<div class="row mt" style="gap:6px">
        <span class="tag p-wait" style="min-width:84px">${esc(m.label)} · 미제공</span>
        <input id="mat_${t.id}_${m.key}" placeholder="텍스트 또는 URL">
        <input type="file" id="file_${t.id}_${m.key}" style="max-width:120px">
        <button class="btn sm" onclick="provide('${t.id}','${m.key}')">제공</button></div>`;
    });
  }
  // 추천 채용 (업무 기준 — 비차단 업셀)
  if(t.recommendedHires.length){
    inner+=`<div class="mt small">더 정확하게 하려면: `+t.recommendedHires.map(r=>`<button class="btn2 sm" onclick="hire('${r.roleFamily}')">${esc(r.title)} 채용</button>`).join(" ")+`</div>`;
  }
  // 단일 CTA(중앙화) — 모든 업무 유형 동일 흐름
  if(t.cta && t.cta.kind!=="blocked"){
    if(t.cta.label==="이대로 초안으로 진행하기"||t.cta.label==="최소 정보로 초안 진행하기")
      inner+=`<div class="mt small" style="color:#e8c772">일부 자료가 아직 제공되지 않았습니다. 현재 자료만으로도 초안 진행은 가능하지만, 자료를 더 제공할수록 결과물이 더 정확해집니다.</div>`;
    inner+=`<div class="mt"><button class="btn" onclick="execute('${t.id}')">${esc(t.cta.label)}</button></div>`;
  } else if(t.cta && t.cta.kind==="blocked"){
    inner+=`<div class="mt small" style="color:#f0a0c0">지금은 바로 진행할 수 없습니다. 아래가 필요합니다:</div>
      <div class="small">${(t.nextActions||[]).map(a=>`· ${esc(a)}`).join("<br>")||"필요한 자료/직원을 확인해 주세요."}</div>`;
  }
  // 결과물 카드
  if(t.results.length){
    inner+=`<div class="mt b small">결과물</div>`;
    if(t.partialMaterials) inner+=`<div class="small" style="color:#e8c772">일부 자료가 부족한 상태에서 초안으로 작성되었습니다. 자료를 더 제공하면 다시 실행해 품질을 높일 수 있습니다.</div>`;
    t.results.forEach(r=>{
      inner+=`<div class="result"><div class="b small">${esc(r.outputType)} · ${r.state==="final"?"최종본":"초안"} · ${esc(r.by)}</div>${esc(r.content)}</div>`;
    });
    if(t.status!=="approved") inner+=`<div class="row mt"><button class="btn" onclick="approve('${t.id}')">승인하기</button><button class="btn2" onclick="revise('${t.id}')">수정 요청</button></div>`;
  }
  return `<div class="card">${inner}</div>`;
}

async function register(){const v=($("newtask")||{}).value?.trim();if(!v)return;const r=await api("/api/register",{title:v});DB=r.dashboard;render();}
async function quick(title){const r=await api("/api/register",{title});DB=r.dashboard;render();}
async function provide(taskId,key){
  const fileEl=$(`file_${taskId}_${key}`), txt=$(`mat_${taskId}_${key}`).value.trim();
  let kind="text",value=txt;
  if(fileEl&&fileEl.files&&fileEl.files[0]){const f=fileEl.files[0];value=f.name;kind=f.type.startsWith("image/")?"image":"file";}
  else if(/^https?:\/\//.test(txt))kind="url";
  if(!value){alert("자료를 입력하거나 파일을 선택하세요");return;}
  const r=await api("/api/provide",{taskId,infoKey:key,kind,value});DB=r.dashboard;render();
}
async function execute(taskId){const r=await api("/api/execute",{taskId});DB=r.dashboard;render();}
async function proceed(taskId){const r=await api("/api/proceed",{taskId});DB=r.dashboard;render();}
async function hire(roleFamily){const r=await api("/api/hire",{roleFamily});DB=r.dashboard;render();}
async function hideCard(taskId){const r=await api("/api/hide",{taskId});DB=r.dashboard;render();}
async function approve(taskId){const r=await api("/api/approve",{taskId,overall:5});DB=r.dashboard;TOAST="결과물이 승인되었습니다. 결과물 탭에서 다시 확인할 수 있습니다.";render();}
async function revise(taskId){const note=prompt("어떻게 수정할까요?");if(!note)return;const r=await api("/api/revise",{taskId,note});DB=r.dashboard;render();}
</script></body></html>
